<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zimní příprava - Tipovačka</title>
    <style>
        :root {
            --primary-color: #00ff88;
            --bg-dark: rgba(20, 20, 20, 0.85);
            --glass: rgba(255, 255, 255, 0.1);
            --glass-border: rgba(255, 255, 255, 0.2);
        }
        
        body {
            font-family: 'Segoe UI', system-ui, sans-serif;
            margin: 0;
            padding: 20px;
            color: #ffffff;
            background-color: #111;
            background-image: url('pozadi.jpeg');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
        }

        .container {
            max-width: 1000px;
            margin: 0 auto;
            background: var(--bg-dark);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border-radius: 20px;
            padding: 30px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.8);
            border: 1px solid var(--glass-border);
        }

        h1 {
            text-align: center;
            color: var(--primary-color);
            font-size: 2.5em;
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-bottom: 20px;
            text-shadow: 0 0 15px rgba(0, 255, 136, 0.4);
        }

        /* Styl pro vyhledávací pole */
        .search-container {
            margin-bottom: 20px;
            text-align: center;
        }

        #searchInput {
            width: 100%;
            max-width: 400px;
            padding: 12px 20px;
            font-size: 1.1em;
            color: #fff;
            background: rgba(0, 0, 0, 0.5);
            border: 1px solid var(--primary-color);
            border-radius: 30px;
            outline: none;
            transition: all 0.3s ease;
        }

        #searchInput::placeholder {
            color: rgba(255, 255, 255, 0.6);
        }

        #searchInput:focus {
            box-shadow: 0 0 15px rgba(0, 255, 136, 0.3);
            background: rgba(0, 0, 0, 0.8);
        }

        .table-responsive {
            overflow-x: auto;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 10px;
        }

        th, td {
            padding: 15px;
            text-align: left;
            border-bottom: 1px solid var(--glass);
        }

        th {
            background-color: rgba(0, 255, 136, 0.15);
            color: var(--primary-color);
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 1px;
            position: sticky;
            top: 0;
        }

        tr:hover td {
            background-color: rgba(255, 255, 255, 0.08);
            transition: background 0.3s ease;
        }

        .rank-1 { color: #ffd700; font-weight: 900; font-size: 1.3em; text-shadow: 0 0 10px rgba(255,215,0,0.5); }
        .rank-2 { color: #c0c0c0; font-weight: bold; font-size: 1.2em; }
        .rank-3 { color: #cd7f32; font-weight: bold; font-size: 1.2em; }

        .loader {
            text-align: center;
            padding: 40px;
            color: var(--primary-color);
            font-size: 1.2em;
            font-weight: bold;
        }

        .points-total {
            color: var(--primary-color);
            font-weight: bold;
            font-size: 1.1em;
        }

        .no-results {
            text-align: center;
            padding: 20px;
            color: #ffaa00;
            font-style: italic;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🏆 Tipovačka - Top 100</h1>
        
        <div class="search-container">
            <input type="text" id="searchInput" placeholder="🔍 Vyhledej jméno fanouška..." onkeyup="filtrujTabulku()">
        </div>
        
        <div class="table-responsive">
            <table id="leaderboard">
                <thead>
                    <tr>
                        <th>Pořadí</th>
                        <th>Jméno fanouška</th>
                        <th>Umístění (b.)</th>
                        <th>Bonusy (b.)</th>
                        <th>Celkem bodů</th>
                    </tr>
                </thead>
                <tbody id="tabulka-telo">
                    <tr>
                        <td colspan="5" class="loader">Načítám aktuální výsledky z tabulky...</td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>

    <script>
        // SEM PŘIJDE ODKAZ NA TVÁ DATA Z GOOGLE SHEETS
        const dataUrl = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vQV9zgAr6YDisVCJo-k3t9iusjzfA_WBchSObYJ8rAIve99NBzTlr6OD-ahb57CdM08PgmFqwRp02kQ/pub?gid=1446924552&single=true&output=csv';
        
        // Sem si uložíme všechny načtené hráče pro rychlé filtrování
        let vsichniHraci = [];

        async function nactiData() {
            try {
                const response = await fetch(dataUrl);
                const data = await response.text();
                zpracujData(data);
            } catch (error) {
                console.error('Chyba při načítání:', error);
                document.getElementById('tabulka-telo').innerHTML = 
                    '<tr><td colspan="5" style="text-align:center; color:#ff4444;">Nepodařilo se načíst data z tabulky. Zkontroluj propojení.</td></tr>';
            }
        }

        function zpracujData(csvText) {
            const radky = csvText.split('\n');
            vsichniHraci = [];

            // Přečteme data z listu "Přehled fans" od řádku 2
            for (let i = 1; i < radky.length; i++) {
                if (!radky[i].trim()) continue;
                
                const bunky = radky[i].split(',');
                
                if(bunky.length >= 45) {
                    const jmeno = bunky[2].replace(/"/g, '').trim(); // Sloupec C
                    const celkem = Number(bunky[41]) || 0; // Sloupec AP
                    
                    if (jmeno === "" || (celkem === 0 && jmeno === "")) continue;

                    vsichniHraci.push({
                        jmeno: jmeno,
                        bodyUmisteni: Number(bunky[39]) || 0, // Sloupec AN
                        bodyBonus: Number(bunky[40]) || 0,    // Sloupec AO
                        celkem: celkem,
                        poradi: Number(bunky[44]) || 999      // Sloupec AS
                    });
                }
            }

            // Seřadíme pole podle celkového pořadí a vezmeme TOP 100
            vsichniHraci.sort((a, b) => a.poradi - b.poradi);
            vsichniHraci = vsichniHraci.slice(0, 100);

            // Prvotní vykreslení
            vykresliTabulku(vsichniHraci);
        }

        function vykresliTabulku(dataKPobrazeni) {
            const tbody = document.getElementById('tabulka-telo');
            tbody.innerHTML = '';

            if (dataKPobrazeni.length === 0) {
                tbody.innerHTML = '<tr><td colspan="5" class="no-results">Nenalezen žádný fanoušek s tímto jménem.</td></tr>';
                return;
            }

            dataKPobrazeni.forEach(hrac => {
                const tr = document.createElement('tr');
                
                let rankClass = '';
                if (hrac.poradi === 1) rankClass = 'rank-1';
                else if (hrac.poradi === 2) rankClass = 'rank-2';
                else if (hrac.poradi === 3) rankClass = 'rank-3';

                tr.innerHTML = `
                    <td class="${rankClass}">${hrac.poradi}.</td>
                    <td style="font-weight: 600;">${hrac.jmeno}</td>
                    <td>${hrac.bodyUmisteni}</td>
                    <td>${hrac.bodyBonus}</td>
                    <td class="points-total">${hrac.celkem}</td>
                `;
                tbody.appendChild(tr);
            });
        }

        function filtrujTabulku() {
            const hledanyText = document.getElementById('searchInput').value.toLowerCase();
            
            // Vyfiltrujeme hráče, jejichž jméno obsahuje hledaný text
            const vyfiltrovaniHraci = vsichniHraci.filter(hrac => 
                hrac.jmeno.toLowerCase().includes(hledanyText)
            );
            
            vykresliTabulku(vyfiltrovaniHraci);
        }

        // Spustit načítání hned po otevření webu
        document.addEventListener('DOMContentLoaded', nactiData);
    </script>
</body>
</html>
