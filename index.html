<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chance liga - KBZ tipovačka</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&family=Oswald:wght@500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --bg-main: #0b111e;
            --bg-card: #161d2b;
            --border-color: #232b38;
            --text-main: #ffffff;
            --text-muted: #8b95a5;
            --accent-blue: #0088ff;
            --accent-yellow: #ffd700;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-main);
            color: var(--text-main);
            line-height: 1.5;
            padding-bottom: 50px;
            background-image: url('pozadi.jpeg');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
        }

        .container { max-width: 1200px; margin: 0 auto; padding: 0 20px; position: relative; }

        /* Hlavička */
        header { text-align: center; margin-top: 40px; margin-bottom: 30px; }
        .logo-text { font-family: 'Oswald', sans-serif; font-size: 2.8rem; text-transform: uppercase; letter-spacing: 1px; }
        .logo-text span { color: var(--accent-blue); }
        
        /* Vyhledávání s našeptávačem */
        .search-container { position: relative; max-width: 600px; margin: 0 auto 40px auto; z-index: 100; }
        .search-input {
            width: 100%; padding: 15px 20px 15px 45px;
            background-color: rgba(22, 29, 43, 0.9); border: 1px solid var(--accent-blue);
            border-radius: 30px; color: var(--text-main); font-size: 1.1rem;
            box-shadow: 0 5px 20px rgba(0, 136, 255, 0.2);
        }
        .search-input:focus { outline: none; background-color: #1a2333; }
        .search-container i { position: absolute; left: 18px; top: 17px; color: var(--text-muted); font-size: 1.2rem; }
        
        .autocomplete-results {
            position: absolute; top: 60px; left: 0; right: 0;
            background-color: var(--bg-card); border: 1px solid var(--border-color);
            border-radius: 12px; max-height: 300px; overflow-y: auto; display: none;
            box-shadow: 0 10px 30px rgba(0,0,0,0.8);
        }
        .autocomplete-item {
            padding: 12px 20px; cursor: pointer; border-bottom: 1px solid var(--border-color);
            display: flex; justify-content: space-between; align-items: center;
        }
        .autocomplete-item:hover { background-color: rgba(255,255,255,0.05); }

        /* Sekce nadpisy */
        .section-title { 
            font-family: 'Oswald', sans-serif; font-size: 1.5rem; color: var(--text-muted); 
            border-bottom: 2px solid var(--border-color); padding-bottom: 10px; margin-bottom: 20px; text-transform: uppercase; 
        }

        /* Tipy Zajíců (Karty) */
        .zajici-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 20px; margin-bottom: 50px; }
        .zajic-card { 
            background: linear-gradient(145deg, var(--bg-card), #101520); border: 1px solid var(--border-color); 
            border-radius: 12px; padding: 20px; text-align: center; cursor: pointer; transition: transform 0.2s;
        }
        .zajic-card:hover { transform: translateY(-5px); border-color: var(--accent-yellow); }
        .zajic-avatar {
            width: 70px; height: 70px; margin: 0 auto 15px auto; border-radius: 50%;
            background: linear-gradient(135deg, var(--accent-blue), #00d2ff);
            display: flex; align-items: center; justify-content: center; font-family: 'Oswald'; font-size: 1.8rem; font-weight: bold;
        }
        .zajic-name { font-family: 'Oswald', sans-serif; font-size: 1.3rem; margin-bottom: 10px; }
        .zajic-points { font-size: 1.1rem; color: var(--accent-yellow); font-weight: bold; }

        /* Záložky pro žebříčky */
        .tabs { display: flex; justify-content: center; gap: 10px; margin-bottom: 20px; flex-wrap: wrap; }
        .tab-btn {
            background-color: var(--bg-card); border: 1px solid var(--border-color); color: var(--text-muted);
            padding: 12px 24px; border-radius: 30px; cursor: pointer; font-family: 'Oswald', sans-serif;
            font-size: 1rem; text-transform: uppercase; transition: all 0.3s;
        }
        .tab-btn.active { background-color: var(--accent-blue); color: #fff; border-color: var(--accent-blue); }
        .tab-btn:hover:not(.active) { background-color: rgba(255,255,255,0.05); }

        /* Tabulka */
        .table-container { background-color: rgba(22, 29, 43, 0.9); border: 1px solid var(--border-color); border-radius: 12px; overflow-x: auto; margin-bottom: 50px;}
        table { width: 100%; border-collapse: collapse; text-align: left; }
        th, td { padding: 15px 20px; border-bottom: 1px solid var(--border-color); }
        th { font-size: 0.85rem; text-transform: uppercase; color: var(--text-muted); font-weight: 600; background: rgba(0,0,0,0.3); }
        tr { cursor: pointer; transition: background 0.2s; }
        tr:hover { background-color: rgba(255,255,255,0.05); }
        .rank-col { font-family: 'Oswald', sans-serif; font-size: 1.2rem; width: 80px; text-align: center; }
        .points-col { font-family: 'Oswald', sans-serif; font-size: 1.1rem; font-weight: bold; }

        /* Vyskakovací okno (Modal) pro detail hráče */
        .modal-overlay {
            position: fixed; top: 0; left: 0; right: 0; bottom: 0;
            background-color: rgba(0,0,0,0.8); backdrop-filter: blur(5px);
            display: none; align-items: center; justify-content: center; z-index: 1000;
        }
        .modal-card {
            background-color: var(--bg-card); border: 1px solid var(--border-color);
            border-radius: 16px; width: 90%; max-width: 500px; padding: 30px; position: relative;
            box-shadow: 0 20px 50px rgba(0,0,0,0.9);
        }
        .close-btn {
            position: absolute; top: 15px; right: 20px; font-size: 1.5rem; color: var(--text-muted);
            cursor: pointer; transition: color 0.2s;
        }
        .close-btn:hover { color: #fff; }
        
        .modal-header { text-align: center; margin-bottom: 30px; border-bottom: 1px solid var(--border-color); padding-bottom: 20px; }
        .modal-avatar {
            width: 80px; height: 80px; margin: 0 auto 15px auto; border-radius: 50%;
            background: linear-gradient(135deg, #ff4d29, #ffd700);
            display: flex; align-items: center; justify-content: center; font-family: 'Oswald'; font-size: 2rem; color: #fff;
        }
        .modal-name { font-family: 'Oswald', sans-serif; font-size: 1.8rem; }
        
        .modal-stats { display: flex; flex-direction: column; gap: 12px; }
        .modal-stat-row { display: flex; justify-content: space-between; align-items: center; background: rgba(0,0,0,0.2); padding: 12px 20px; border-radius: 8px; }
        .modal-stat-label { color: var(--text-muted); font-size: 0.85rem; text-transform: uppercase; letter-spacing: 1px; }
        .modal-stat-val { font-family: 'Oswald', sans-serif; font-size: 1.25rem; }
        .val-total { color: var(--accent-yellow); font-size: 1.4rem; }

        .loader { text-align: center; padding: 40px; color: var(--text-muted); }
    </style>
</head>
<body>

    <div class="container">
        <header>
            <div class="logo-text">CHANCE LIGA - <span>KBZ TIPOVAČKA</span></div>
        </header>

        <div class="search-container">
            <i class="fas fa-search"></i>
            <input type="text" id="searchInput" class="search-input" placeholder="Napiš jméno a hned uvidíš výsledek..." oninput="hledejHrace()">
            <div class="autocomplete-results" id="searchResults"></div>
        </div>

        <h2 class="section-title">🎙️ Tipy Zajíců</h2>
        <div class="zajici-grid" id="zajici-container">
            <div class="loader">Načítám Zajíce...</div>
        </div>

        <h2 class="section-title" style="margin-top: 40px;">🏆 Žebříčky</h2>
        
        <div class="tabs">
            <button class="tab-btn" onclick="zmenZalozku('umisteni')" id="tab-umisteni">Body za pořadí</button>
            <button class="tab-btn" onclick="zmenZalozku('bonusy')" id="tab-bonusy">Body za bonusové otázky</button>
            <button class="tab-btn active" onclick="zmenZalozku('celkem')" id="tab-celkem">Celkové pořadí</button>
        </div>

        <div class="table-container">
            <table>
                <thead>
                    <tr id="tabulka-hlavicka">
                        <th style="text-align:center;">Pořadí</th>
                        <th>Jméno fanouška</th>
                        <th style="text-align:right;">Celkem bodů</th>
                    </tr>
                </thead>
                <tbody id="tabulka-telo">
                    <tr><td colspan="3" class="loader">Načítám data z tabulky...</td></tr>
                </tbody>
            </table>
        </div>
    </div>

    <div class="modal-overlay" id="playerModal" onclick="zavriModal(event)">
        <div class="modal-card">
            <i class="fas fa-times close-btn" onclick="document.getElementById('playerModal').style.display='none'"></i>
            <div class="modal-header">
                <div class="modal-avatar" id="modalInitials">--</div>
                <div class="modal-name" id="modalName">Jméno Hráče</div>
            </div>
            <div class="modal-stats">
                <div class="modal-stat-row">
                    <span class="modal-stat-label">Body za umístění</span>
                    <span class="modal-stat-val" id="modalPtsUmisteni">-</span>
                </div>
                <div class="modal-stat-row">
                    <span class="modal-stat-label">Pořadí za umístění</span>
                    <span class="modal-stat-val" id="modalRankUmisteni">-</span>
                </div>
                <div class="modal-stat-row">
                    <span class="modal-stat-label">Body za bonusové otázky</span>
                    <span class="modal-stat-val" id="modalPtsBonus">-</span>
                </div>
                <div class="modal-stat-row">
                    <span class="modal-stat-label">Pořadí za bonusové otázky</span>
                    <span class="modal-stat-val" id="modalRankBonus">-</span>
                </div>
                <div class="modal-stat-row" style="background: rgba(255, 215, 0, 0.1); border: 1px solid rgba(255, 215, 0, 0.3);">
                    <span class="modal-stat-label" style="color: var(--accent-yellow); font-weight:bold;">Celkem bodů</span>
                    <span class="modal-stat-val val-total" id="modalPtsTotal">-</span>
                </div>
                <div class="modal-stat-row" style="background: rgba(0, 136, 255, 0.1); border: 1px solid rgba(0, 136, 255, 0.3);">
                    <span class="modal-stat-label" style="color: var(--accent-blue); font-weight:bold;">Celkové pořadí</span>
                    <span class="modal-stat-val val-total" id="modalRankTotal">-</span>
                </div>
            </div>
        </div>
    </div>

    <script>
        const dataUrl = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vQV9zgAr6YDisVCJo-k3t9iusjzfA_WBchSObYJ8rAIve99NBzTlr6OD-ahb57CdM08PgmFqwRp02kQ/pub?gid=1446924552&single=true&output=csv';
        
        let vsichniHraci = [];
        let aktivniZalozka = 'celkem';

        function getInitials(name) {
            const parts = name.trim().split(' ');
            return parts.length >= 2 ? (parts[0][0] + parts[1][0]).toUpperCase() : name.substring(0, 2).toUpperCase();
        }

        // Pokročilý inteligentní CSV parser, který ignoruje čárky uvnitř uvozovek u desetinných čísel
        function parseCSVRow(rowText) {
            let cells = [];
            let insideQuotes = false;
            let currentCell = '';
            for (let i = 0; i < rowText.length; i++) {
                let char = rowText[i];
                if (char === '"') {
                    insideQuotes = !insideQuotes;
                } else if (char === ',' && !insideQuotes) {
                    cells.push(currentCell);
                    currentCell = '';
                } else {
                    currentCell += char;
                }
            }
            cells.push(currentCell);
            return cells;
        }

        function vycistiCislo(text) {
            if (!text) return 0;
            // Převede českou desetinnou čárku na tečku pro správný Javascriptový parse
            let ciste = text.replace(/"/g, '').replace(',', '.').trim();
            return parseFloat(ciste) || 0;
        }

        async function nactiData() {
            try {
                const response = await fetch(dataUrl);
                const data = await response.text();
                zpracujData(data);
            } catch (error) {
                console.error('Chyba:', error);
                document.getElementById('tabulka-telo').innerHTML = '<tr><td colspan="3" class="loader">Chyba při načítání dat.</td></tr>';
            }
        }

        function zpracujData(csvText) {
            const radky = csvText.split('\n');
            vsichniHraci = [];

            for (let i = 1; i < radky.length; i++) {
                if (!radky[i].trim()) continue;
                
                // Použití nového parseru buněk
                const bunky = parseCSVRow(radky[i]); 
                
                if(bunky.length >= 45) {
                    const jmeno = bunky[2].replace(/"/g, '').trim(); 
                    if (jmeno === "") continue;

                    vsichniHraci.push({
                        puvodniIndex: i, 
                        jmeno: jmeno,
                        bodyUmisteni: vycistiCislo(bunky[39]), // AN
                        bodyBonus: vycistiCislo(bunky[40]),    // AO
                        celkem: vycistiCislo(bunky[41]),       // AP
                        poradiUmisteni: parseInt(bunky[42].replace(/"/g, '')) || 999, // AQ
                        poradiBonus: parseInt(bunky[43].replace(/"/g, '')) || 999,    // AR
                        poradiCelkem: parseInt(bunky[44].replace(/"/g, '')) || 999     // AS
                    });
                }
            }

            vykresliZajice();
            vykresliTabulku();
        }

        function vykresliZajice() {
            const container = document.getElementById('zajici-container');
            container.innerHTML = '';
            
            // Řádky 3, 5, 6, 7 odpovídají indexům 2, 4, 5, 6 v našem zpracování
            const hledaneIndexy = [2, 4, 5, 6]; 
            const zajici = vsichniHraci.filter(h => hledaneIndexy.includes(h.puvodniIndex));

            if(zajici.length === 0) {
                container.innerHTML = '<div class="loader">Zatím nebyly nalezeny data pro Zajíce.</div>';
                return;
            }

            zajici.forEach(zajic => {
                const card = document.createElement('div');
                card.className = 'zajic-card';
                card.onclick = () => otevriModal(zajic);
                card.innerHTML = `
                    <div class="zajic-avatar">${getInitials(zajic.jmeno)}</div>
                    <div class="zajic-name">${zajic.jmeno}</div>
                    <div class="zajic-points">${zajic.celkem} bodů</div>
                    <div style="font-size:0.8rem; color:var(--text-muted); margin-top:5px;">Celkově ${zajic.poradiCelkem}. místo</div>
                `;
                container.appendChild(card);
            });
        }

        function zmenZalozku(tabName) {
            aktivniZalozka = tabName;
            
            document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
            document.getElementById(`tab-${tabName}`).classList.add('active');
            
            // Dynamická změna hlavičky tabulky podle vybrané sekce
            const hlavicka = document.getElementById('tabulka-hlavicka');
            if (tabName === 'umisteni') {
                hlavicka.innerHTML = '<th style="text-align:center;">Pořadí</th><th>Jméno fanouška</th><th style="text-align:right;">Body za umístění</th>';
            } else if (tabName === 'bonusy') {
                hlavicka.innerHTML = '<th style="text-align:center;">Pořadí</th><th>Jméno fanouška</th><th style="text-align:right;">Body za bonusové otázky</th>';
            } else {
                hlavicka.innerHTML = '<th style="text-align:center;">Pořadí</th><th>Jméno fanouška</th><th style="text-align:right;">Celkem bodů</th>';
            }

            vykresliTabulku();
        }

        function vykresliTabulku() {
            const tbody = document.getElementById('tabulka-telo');
            tbody.innerHTML = '';

            let data = [...vsichniHraci];

            if (aktivniZalozka === 'umisteni') {
                data.sort((a, b) => a.poradiUmisteni - b.poradiUmisteni);
            } else if (aktivniZalozka === 'bonusy') {
                data.sort((a, b) => a.poradiBonus - b.poradiBonus);
            } else {
                data.sort((a, b) => a.poradiCelkem - b.poradiCelkem);
            }

            data.forEach(hrac => {
                const tr = document.createElement('tr');
                tr.onclick = () => otevriModal(hrac); 

                let poradi = 0;
                let bodyZobrazeni = 0;

                if (aktivniZalozka === 'umisteni') {
                    poradi = hrac.poradiUmisteni; bodyZobrazeni = hrac.bodyUmisteni;
                } else if (aktivniZalozka === 'bonusy') {
                    poradi = hrac.poradiBonus; bodyZobrazeni = hrac.bodyBonus;
                } else {
                    poradi = hrac.poradiCelkem; bodyZobrazeni = hrac.celkem;
                }

                let colorClass = poradi === 1 ? 'color: var(--accent-yellow); font-weight: bold;' : '';

                tr.innerHTML = `
                    <td class="rank-col" style="${colorClass}">${poradi}.</td>
                    <td style="font-weight: 600;">${hrac.jmeno}</td>
                    <td class="points-col" style="text-align:right;">${bodyZobrazeni}</td>
                `;
                tbody.appendChild(tr);
            });
        }

        function hledejHrace() {
            const input = document.getElementById('searchInput').value.toLowerCase();
            const resultBox = document.getElementById('searchResults');
            resultBox.innerHTML = '';

            if (input.length < 1) { // Reaguje ihned od prvního písmene
                resultBox.style.display = 'none';
                return;
            }

            const shody = vsichniHraci.filter(h => h.jmeno.toLowerCase().includes(input));

            if (shody.length > 0) {
                resultBox.style.display = 'block';
                shody.forEach(hrac => {
                    const div = document.createElement('div');
                    div.className = 'autocomplete-item';
                    div.innerHTML = `<span><strong>${hrac.jmeno}</strong></span> <span style="color:var(--accent-yellow); font-size:0.9rem;">${hrac.celkem} b.</span>`;
                    div.onclick = () => {
                        document.getElementById('searchInput').value = '';
                        resultBox.style.display = 'none';
                        otevriModal(hrac);
                    };
                    resultBox.appendChild(div);
                });
            } else {
                resultBox.style.display = 'block';
                resultBox.innerHTML = '<div class="autocomplete-item" style="color:var(--text-muted); cursor:default;">Nikdo nenalezen</div>';
            }
        }

        document.addEventListener('click', function(e) {
            if (!e.target.closest('.search-container')) {
                document.getElementById('searchResults').style.display = 'none';
            }
        });

        function otevriModal(hrac) {
            document.getElementById('modalInitials').innerText = getInitials(hrac.jmeno);
            document.getElementById('modalName').innerText = hrac.jmeno;
            
            // První jdou vždy Body, pod nimi jejich Pořadí v dané kategorii
            document.getElementById('modalPtsUmisteni').innerText = hrac.bodyUmisteni;
            document.getElementById('modalRankUmisteni').innerText = `${hrac.poradiUmisteni}. místo`;
            
            document.getElementById('modalPtsBonus').innerText = hrac.bodyBonus;
            document.getElementById('modalRankBonus').innerText = `${hrac.poradiBonus}. místo`;
            
            document.getElementById('modalPtsTotal').innerText = hrac.celkem;
            document.getElementById('modalRankTotal').innerText = `${hrac.poradiCelkem}. místo`;

            document.getElementById('playerModal').style.display = 'flex';
        }

        function zavriModal(event) {
            if (event.target.id === 'playerModal') {
                document.getElementById('playerModal').style.display = 'none';
            }
        }

        document.addEventListener('DOMContentLoaded', nactiData);
    </script>
</body>
</html>
